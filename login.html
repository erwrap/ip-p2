<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — K&B Bookkeeping</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f5f7f7;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: #2a8a7e;
  color: white;
  padding: 20px;
  text-align: center;
  font-weight: bold;
}

.container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-card {
  background: white;
  padding: 30px;
  width: 320px;
  border: 1px solid #d6f0ec;
  border-radius: 4px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #2a8a7e;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #1d7a70;
}

.error {
  display: none;
  background: #fde8e8;
  color: #c0392b;
  padding: 8px;
  margin-bottom: 10px;
  font-size: 13px;
  text-align: center;
}

.register {
  text-align: center;
  margin-top: 12px;
  font-size: 12px;
}

.register a {
  color: #2a8a7e;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="header">K&B Bookkeeping</div>

<div class="container">
  <div class="login-card">

    <h2 style="text-align:center;margin-bottom:15px;color:#1d7a70;">Login</h2>

    <div id="errorBox" class="error"></div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="register">
      <a href="register.html">Create an account</a>
    </div>

  </div>
</div>

<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("errorBox");

  errorBox.style.display = "none";

  fetch("login.php", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "success") {
      window.location.href = data.redirect;
    } else {
      errorBox.innerText = data.message;
      errorBox.style.display = "block";
    }

  })
  .catch(() => {
    errorBox.innerText = "Server error. Try again.";
    errorBox.style.display = "block";
  });
}
</script>

</body>
</html>
